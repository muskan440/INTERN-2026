<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="./registration.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h3>COMPANY NAME</h3>
        <h1>REGISTRATION FORM</h1>
    </div>

    
    <section>
        <h2>PERSONAL INFORMATION</h2>

        <div class="row">
            <label>Full Name</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Gender</label>
            <div class="options">
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
            </div>
        </div>

        <div class="double-row">
            <div>
                <label>Date of Birth</label>
                <input type="date">
            </div>

            <div>
                <label>Place of Birth</label>
                <input type="text">
            </div>
        </div>

        <div class="double-row">
            <div>
                <label>Nationality</label>
                <input type="text">
            </div>

            <div>
                <label>Religion</label>
                <input type="text">
            </div>
        </div>

        <div class="row">
            <label>Residence Status</label>
            <div class="options">
                <input type="radio" name="status"> Residence
                <input type="radio" name="status"> Non Residence
            </div>
        </div>

        <div class="row">
            <label>Marital Status</label>
            <div class="options">
                <input type="radio" name="marital"> Single
                <input type="radio" name="marital"> Married
                <input type="radio" name="marital"> Widowed
            </div>
        </div>

        <div class="double-row">
            <div>
                <label>National ID No</label>
                <input type="text">
            </div>

            <div>
                <label>TIN No</label>
                <input type="text">
            </div>
        </div>
    </section>

    <!-- Contact Information -->
    <section>
        <h2>CONTACT INFORMATION</h2>

        <div class="row">
            <label>Address</label>
            <input type="text">
        </div>

        <div class="double-row">
            <div>
                <label>City</label>
                <input type="text">
            </div>

            <div>
                <label>State</label>
                <input type="text">
            </div>
        </div>

        <div class="double-row">
            <div>
                <label>Zip Code</label>
                <input type="text">
            </div>

            <div>
                <label>Country</label>
                <input type="text">
            </div>
        </div>

        <div class="double-row">
            <div>
                <label>Phone</label>
                <input type="text">
            </div>

            <div>
                <label>Email</label>
                <input type="email">
            </div>
        </div>
    </section>

   

   
</div>

</body>
</html>
