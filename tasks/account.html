
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
        font-size: medium;
    }

    body{
        background-color: darkcyan;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        width:700px;
        height: 800px;
        background-color: white;
        border-radius:10px;
        overflow:hidden;
    }

    .header{
        background-color: white;
        text-align:center;
        padding:10px;
        font-size:30px;
        font-weight:bold;
        color:#555;
    }

    .form-container{
        padding:10px;
    }

    .row{
        display:flex;
        gap:20px;
        margin-bottom:15px;
    }

    .form-group{
        flex:1;
    }

    label{
        display:block;
        margin-bottom:8px;
        color:#2bdbcc;
        font-size:14px;
        font-weight:bold;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    select,
    textarea{
        width:100%;
        padding:12px;
        border:1px solid #ddd;
        border-radius:4px;
        font-size:16px;
    }

    textarea{
        height:120px;
        resize:none;
    }

    .radio-group,
    .checkbox-group{
       
     display:flex;
    gap:15px;
    margin-top:10px;
    }

    .income-box{
     display:flex;
    align-items:center;
        gap:10px;
    }

    .income-value{
        background:#15e87f;
         color:white;
        padding:8px 12px;
         border-radius:5px;
        font-weight:bold;
    }

    .footer{
       background:#f2f2f2;
        padding:20px;
        text-align:right;
    }

    .btn{
        background:#1abc9c;
    color:white;
     border:none;
     padding:12px 30px;
    font-size:18px;
          border-radius:5px;
           cursor:pointer;
    }

    .btn:hover{
          background:#16a085;
    }
</style>
</head>

<body>

<div class="container">

    <div class="header">
        Create Account
    </div>

    <div class="form-container">

        <div class="row">
            <div class="form-group">
          <label>First Name *</label>
         <input type="text" placeholder="Enter your first name">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="Enter your last name">
            </div>
        </div>

<div class="row">
            <div class="form-group">
     <label>Email *</label>
                <input type="email" placeholder="Enter your email">
            </div>
        </div>

        <div class="row">
    <div class="form-group">
     <label>Password *</label>

     <input type="password" placeholder="Enter your password">
            </div>

            <div class="form-group">

         <label>Confirm Password *</label>
                <input type="password" placeholder="Enter your password again">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
          <label>Gender:</label>
                <div class="radio-group">
        <label><input type="radio" name="gender"> Male</label>
                    <label><input type="radio" name="gender"> Female</label>
                </div>
 </div>

            <div class="form-group">
  <label>Hobbies</label>
                <div class="checkbox-group">
                    <label><input type="checkbox"> Music</label>
        <label><input type="checkbox"> Sports</label>
                    <label><input type="checkbox"> Travel</label>
                    <label><input type="checkbox"> Movies</label>
     </div>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
 <label>Source of Income</label>
                <select>
                <option>Student</option>
                  <option>Business</option>
                   <option>Employee</option>
                    <option>Other</option>
         </select>
            </div>

            <div class="form-group">
             <label>Income</label>
             <div class="income-box">
                    <input type="range" min="0" max="100">
                    <span class="income-value">20K</span>
         </div>
     </div>
 </div>

        <div class="row">
        
            <div class="form-group">
                <label>Upload Profile Picture</label>
                <input type="file">
            </div>



            <div class="form-group">
                <label>Age</label>
        <input type="number" value="18">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Bio</label>
         <textarea></textarea>
            </div>
        </div>

    </div>

    <div class="footer">
    <button class="btn">Create</button>
    </div>

</div>

</body>
</html>
