<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML: 5 Forms</title>
    
    
</head>
<body>
    <div style="margin-top:5px;">

    <table cellpadding="5" cellspacing="3" border=" 5px" width="600" height="800" align="center" style="border: 4px solid black ;">
        <tr>
            <th><h2 style="border: 2px solid black; taxt-align:center;">HTML: 5 Forms</h2></th>
        </tr>
        <tr>
            <td>
                <b>Select Your Favorite Color:</b> 
            </td>
            <td>
                <input type="color">
            </td>
        </tr>

        <tr>
            <td>
                <b>Birthday: </b>
            </td>
            <td>
                <input type="date">
            </td>
        </tr>

        <tr>
             <td>
               <b> Birthday(Date & Time): </b>
             </td>
             <td>
                <input type="datetime-local">
             </td>
        </tr>

        <tr>
            <td>
               <b> E-mail:</b>
            </td>
            <td>
                <input type="email" placeholder="Enter Your Email">
            </td>
        </tr>

        <tr>
            <td>
               <b> Birthday(Month & Year): </b>
            </td>
            <td>
                <input type="month">
            </td>
        </tr>

        <tr>
            <td>
              <b>  Quantity Between 1 to 5:</b> 
            </td>
            <td>
                <input type="number" max="5" min="1">
            </td>
        </tr>

        <tr>
            <td>
                <b>Points: </b>
            </td>
            <td>
                <input type="range" min="1" max="100">
            </td>
        </tr>

        <tr>
            <td>
                <b>Search Google: </b>
            </td>
            <td>
                <input type="search">
            </td>
        </tr>
        <tr>
            <td>
                <b>Telephone: </b>
            </td>
            <td>
                <input type="number">
            </td>
        </tr>

    </table>
    </div>
</body>
</html>
