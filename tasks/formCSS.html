<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container{
    display: flex;
    justify-content: center;
        align-items: center;
    }
    </style>
</head>
<body>
    <div class="container" style="margin-top: 5px;">
    <table  cellpadding="5" cellspacing="3" border="5px" width="400" height="300" style="background-color: #f6f4f4; border: 1px solid #0b0909; border-radius: 5px; ">
       
    <tr>
        
        <th>HTML Forms</th>
    </tr> 
       
    <tr>
       <th>Select Your Favourite Color</th>
         <td><input type="color" name="favcolor"></td>


    </tr><BR><BR>
     <tr>
        <th>Birthday:</th>
        <td><input type="date" name="DOB"></td>
     </tr><BR><BR>

        <TR>
            <TH>Birthday(date and time):</TH>
            <td><input type="text" name="dob"></td>
        </TR><br><br>


        <tr>
            <th>E-mail:</th>
            <td><input type="email" name="email"></td>
        </tr><br><br>
        <tr>
            <th>Birthday (month and year):</th>
            <td><input type="month" name="year"></td>


        </tr>
        <br><br>
         <tr>
            <th>Quantity(between 1 and 5):</th>
            <td><input type="text" name="number" min="1" max="5"></td>
            </tr><br><br>

        <tr>
            <th>Points:</th>
            <td> <input type="range" name="points"></td>


        </tr><br><br>
        <tr>
            <th>Search google:</th>
            <td><input type="search" name="search"></td>
        </tr><br><br>

        <tr>
            <th>Telephone:</th>
            <td><input type="tel" name="phone"></td>


        </tr>
    </table>
</div>
</body>
</html>
