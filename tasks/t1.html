<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <div style="border: 1px solid #0c0202; padding: 10px; width: 400px; margin: 0px; overflow: hidden; ">
        <h1 style="overflow: hidden;">User Personal Information</h1>


        <label for="name">Enter your full name</label><br>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Enter your e-mail<label><br>
        <input type="email" id="email" name="email" required><br><br>
        <label for="password">Enter your password</label><br>
        <input type="password" id="password" name="password" required><br><br>
        <label for="password">Confirm your password</label><br>
        <input type="password" id="confirm_password" name="confirm_password" required><br><br>

        <label for="gender">Enter your gender</label><br>
       <input type="radio" id="gender" name="gender" value="male" required>
        <label for="gender">Male</label>
        <input type="radio" id="gender" name="gender" value="female" required>
        <label for="gender">Female</label>
        
        <input type="radio" id="gender" name="gender" value="Others" required>
        <label for="gender">Others</label><br><br>

        <label for="date of birth">Enter your Date of Birth</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <label for="address">Enter your Address</label><br>
            <input type="text" id="address" name="address" required><br><br>

            <input type="submit" value="Submit">

    </div>
    
</body>
</html>
